<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Frakoblet — Infoskjerm</title>
  <style>
    :root { color-scheme: light; }
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100dvh; display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: #fafafa; color: #18181b; padding: 24px;
    }
    .card { max-width: 360px; text-align: center; }
    .badge {
      width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 20px;
      background: #18181b; display: flex; align-items: center; justify-content: center;
    }
    h1 { font-size: 20px; margin: 0 0 8px; }
    p { color: #71717a; font-size: 14px; line-height: 1.5; margin: 0 0 24px; }
    button {
      appearance: none; border: 0; cursor: pointer; font-weight: 600; font-size: 15px;
      background: #18181b; color: #fff; border-radius: 12px; padding: 12px 20px; width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">
      <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
    </div>
    <h1>Du er frakoblet</h1>
    <p>Infoskjerm trenger nett for å laste innhold. Sjekk tilkoblingen og prøv igjen.</p>
    <button onclick="location.reload()">Prøv igjen</button>
  </div>
</body>
</html>
